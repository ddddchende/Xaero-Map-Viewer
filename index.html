<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xaero Map Viewer - Minecraft Style</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238B5A2B' x='10' y='10' width='80' height='80'/><rect fill='%2371A033' x='10' y='10' width='80' height='20'/><rect fill='%236B4423' x='10' y='70' width='80' height='20'/></svg>">
</head>
<body>
  <button id="toggleSidebar">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  
  <div id="app">
    <div id="sidebar">
      <h2>Xaero Map Viewer</h2>
      <div id="status" class="status">正在连接服务器...</div>
      
      <div class="section" data-section="connection">
        <div class="section-title" data-toggle="connection">
          <span class="toggle-icon">▼</span>
          <span>连接设置</span>
        </div>
        <div class="section-content">
          <div class="control-group">
            <div class="inline-label">
              <label>并发加载</label>
              <span id="concurrentValue" class="value">256</span>
            </div>
            <input type="range" id="concurrentSlider" min="16" max="512" value="256" step="1">
          </div>
        </div>
      </div>
      
      <div class="section" data-section="cache">
        <div class="section-title" data-toggle="cache">
          <span class="toggle-icon">▼</span>
          <span>缓存设置</span>
        </div>
        <div class="section-content">
          <div class="control-group">
            <div class="cache-info">
              <span id="cacheSize">计算中...</span>
              <button id="clearCacheBtn">清除缓存</button>
            </div>
          </div>
        </div>
      </div>
      
      <div class="section" data-section="world" id="worldSection" style="display:none;">
        <div class="section-title" data-toggle="world">
          <span class="toggle-icon">▼</span>
          <span>世界选择</span>
        </div>
        <div class="section-content">
          <div class="control-group">
            <label>世界</label>
            <select id="worldSelector"></select>
          </div>
          <div class="control-group">
            <label>维度</label>
            <select id="dimSelector"></select>
          </div>
          <div class="control-group">
            <label>地图类型</label>
            <select id="mapTypeSelector"></select>
          </div>
          <div class="control-group" id="caveModeGroup" style="display:none;">
            <label>洞穴模式</label>
            <select id="caveModeSelector">
              <option value="0">关闭</option>
              <option value="1">分层</option>
              <option value="2">完整</option>
            </select>
          </div>
          <div class="control-group" id="caveStartGroup" style="display:none;">
            <div class="inline-label">
              <label>洞穴Y高度</label>
              <span id="caveStartValue" class="value">64</span>
            </div>
            <input type="range" id="caveStartSlider" min="-64" max="320" value="64" step="1">
          </div>
        </div>
      </div>
      

      <div id="loading" style="display:none;">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
      
      <div id="stats"></div>
    </div>
    
    <div id="map-container">
      <canvas id="mapCanvas"></canvas>
      <div id="zoom-control">
        <span id="zoomLevel" class="zoom-level-label">1x</span>
        <input type="range" id="zoomSlider" min="-8" max="4" value="0" step="0.5">
        <button id="gotoBtn" title="跳转坐标">⊕</button>
        <button id="waypointBtn" title="路径点">⚑</button>
      </div>
    </div>
    
    <div id="waypointModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>路径点</h3>
          <button class="modal-close" id="closeWaypointModal">×</button>
        </div>
        <div class="modal-body">
          <div class="waypoint-filters">
            <input type="text" id="waypointSearch" placeholder="搜索路径点...">
            <div class="waypoint-dim-filter">
              <button class="dim-filter-btn active" data-dim="all">全部</button>
              <button class="dim-filter-btn" data-dim="overworld">主世界</button>
              <button class="dim-filter-btn" data-dim="nether">下界</button>
              <button class="dim-filter-btn" data-dim="end">末地</button>
            </div>
            <div class="waypoint-toggles">
              <label class="checkbox-label">
                <input type="checkbox" id="showWaypointsToggle" checked>
                <span>显示路径点</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="showDisabledWaypoints">
                <span>显示已禁用</span>
              </label>
            </div>
          </div>
          <div id="waypointGroups" class="waypoint-groups"></div>
        </div>
      </div>
    </div>
    
    <div id="gotoModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>跳转坐标</h3>
          <button class="modal-close" id="closeGotoModal">×</button>
        </div>
        <div class="modal-body">
          <div class="goto-inputs">
            <div class="goto-input-group">
              <label>X</label>
              <input type="text" id="targetX" placeholder="0" value="0" oninput="this.value=this.value.replace(/[^0-9\-]/g,'').replace(/(?!^)-/g,'')">
            </div>
            <div class="goto-input-group">
              <label>Z</label>
              <input type="text" id="targetZ" placeholder="0" value="0" oninput="this.value=this.value.replace(/[^0-9\-]/g,'').replace(/(?!^)-/g,'')">
            </div>
          </div>
          <button id="gotoConfirm" class="btn-confirm">跳转</button>
        </div>
      </div>
    </div>
    
    <div id="contextMenu" class="context-menu">
      <div class="context-menu-item" id="ctxGotoNether">
        <span class="context-menu-icon">🔥</span>
        <span>跳转到下界</span>
        <span class="context-menu-coords" id="ctxNetherCoords"></span>
      </div>
      <div class="context-menu-item" id="ctxGotoOverworld">
        <span class="context-menu-icon">🌍</span>
        <span>跳转到主世界</span>
        <span class="context-menu-coords" id="ctxOverworldCoords"></span>
      </div>
      <div class="context-menu-divider"></div>
      <div class="context-menu-item" id="ctxCopyCoords">
        <span class="context-menu-icon">📋</span>
        <span>复制坐标</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
